<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Resume Optimizer</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        iframe { width: 100%; height: 600px; border: none; }
        #status-area { width: 80%; padding: 20px; margin-top: 20px; border: 1px solid #ccc; display: none; }
    </style>
</head>
<body>
    <h1>Upload Your Resume to Begin</h1>
    
    <iframe src="http://localhost:5678/form-test/aed9e327-5992-43af-ac9e-a56c6967e548" id="n8n-form"></iframe>

    <div id="status-area">
        <h3>Current Status: <span id="status-msg">Processing...</span></h3>
        <div id="data-preview"></div>
    </div>

    <script>
        // Polling script stays here to watch for the results 
        // while the user is interacting with the form above
        async function checkStatus() {
            const res = await fetch('/api/status');
            const result = await res.json();
            if (result.status !== "Waiting for n8n to start...") {
                document.getElementById('status-area').style.display = 'block';
                document.getElementById('status-msg').innerText = result.status;
            }
        }
        setInterval(checkStatus, 3000);
    </script>
</body>
</html>
