<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Optimizer - Live Status</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 20px; }
        #status-box { 
            padding: 20px; 
            border: 2px solid #0070f3; 
            border-radius: 8px; 
            background-color: #f0f7ff;
            min-height: 100px;
        }
        .status-text { font-weight: bold; color: #0070f3; font-size: 1.2em; }
        .data-preview { background: #eee; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>Resume Optimization Status</h1>
    <div id="status-box">
        <p class="status-text" id="status-msg">Initializing connection...</p>
        <div id="data-container"></div>
    </div>

    <script>
        async function checkUpdate() {
            try {
                // 1. Fetch the latest update from your edited status.js
                const response = await fetch('/api/status');
                const result = await response.json();

                // 2. Update the message on the screen
                const statusMsg = document.getElementById('status-msg');
                const dataContainer = document.getElementById('data-container');

                statusMsg.innerText = result.status;

                // 3. If there is resume data or a score, show a preview
                if (result.data) {
                    dataContainer.innerHTML = `
                        <p><strong>Latest Update Content:</strong></p>
                        <pre class="data-preview">${typeof result.data === 'object' ? JSON.stringify(result.data, null, 2) : result.data}</pre>
                    `;
                }
            } catch (error) {
                console.error("Waiting for n8n to send data...", error);
            }
        }

        // 4. Poll the API every 2 seconds for real-time feel
        setInterval(checkUpdate, 2000);
    </script>
</body>
</html>
